# This is a transitional production configuration.
# Traffic or NGINX may or may not be used in the final production configuration
# but the Django container will not expose its port to the host (there will be more than one container).

services:
  django: &django
    build:
      context: .
      # This is the most important setting to test the production configuration of Django.
      dockerfile: ./compose/production/django/Dockerfile
    image: insectai/ami_backend
    env_file:
      - ./.envs/.production/.django
      - ./.envs/.production/.postgres
    volumes:
      - ./config:/app/config
    ports:
      - "5001:5000"
    extra_hosts: # hostname aliases to the IPs of persistant services running outside docker network
      - "db:${DATABASE_IP}"
      - "rabbitmq:${RABBITMQ_IP}"
      - "redis:${REDIS_IP}"
      - "nats:${NATS_IP}"
    command: /start
    scale: 1  # Can't scale until the load balancer is within the compose config
    restart: always

  # Workers run on dedicated machines via docker-compose.worker.yml (not here).

  celerybeat:
    <<: *django
    ports: []
    command: /start-celerybeat
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "/celery/healthcheck-beat.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    labels:
      - "autoheal=true"

  flower:
    <<: *django
    ports:
      - "5550:5555"
    command: /start-flower
    restart: always
    volumes:
      - ./data/flower/:/data/

  autoheal:
    # Docker Compose has no native restart-on-unhealthy (swarm-only feature).
    # willfarrell/autoheal watches the docker socket and restarts any container
    # labeled `autoheal=true` that Docker has marked unhealthy.
    image: willfarrell/autoheal:1.2.0
    container_name: ami_production_autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=10       # poll docker for health every 10s
      - AUTOHEAL_START_PERIOD=60   # ignore containers in their start_period
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  awscli:
    build:
      context: .
      dockerfile: ./compose/production/aws/Dockerfile
    env_file:
      - ./.envs/.production/.django
    volumes:
      - ./backups/production/postgres:/backups:z
