services:
  django: &django
    build:
      context: .
      # This is the most important setting to test the production configuration of Django.
      dockerfile: ./compose/production/django/Dockerfile
    image: insectai/ami_backend
    env_file:
      - ./.envs/.production/.django
      - ./.envs/.production/.postgres
    volumes:
      - ./config:/app/config
    ports:
      - "5001:5000"
    extra_hosts:
      - "db:${DATABASE_IP}"
      - "rabbitmq:${RABBITMQ_IP}"
      - "redis:${REDIS_IP}"
      - "nats:${NATS_IP}"
    command: /start
    scale: 0  # We don't need the Django service running, but we inherit the worker settings from it.
    restart: always

  # Dedicated worker hosts carry the heavy jobs and ml_results queues so the
  # main app host (see docker-compose.production.yml) only serves the
  # lightweight antenna queue alongside Django/beat.
  #
  # Each queue runs in its own container so a burst on one class (e.g.
  # ml_results fan-out from a big async_api job) cannot saturate the pool and
  # starve another (e.g. run_job). Every host runs all three services for
  # capacity; to pin a host to fewer queues, remove services from an override
  # file or scale them to 0.
  #
  # CELERY_WORKER_CONCURRENCY is inherited from .envs/.production/.django and
  # applies per service. On small worker VMs that adds up (3 × concurrency
  # prefork processes per host) — tune in the env file if memory pressure
  # becomes a problem.
  celeryworker:
    <<: *django
    scale: 1
    ports: []
    command: /start-celeryworker
    environment:
      CELERY_QUEUES: "antenna"
    restart: always

  celeryworker_jobs:
    <<: *django
    scale: 1
    ports: []
    command: /start-celeryworker
    environment:
      CELERY_QUEUES: "jobs"
      # TODO(#1323): consider overriding CELERY_WORKER_CONCURRENCY to ~4 here.
      # Counter-intuitive but: per-container prefetch = concurrency × prefetch_multiplier(=1),
      # so a 16-wide jobs container reserves up to 16 messages on a single broker channel.
      # When one run_job sits idle inside filter_processed_images for minutes, the other 15
      # reserved slots block sibling jobs from being offered to an idle peer container.
      # Lowering to 4 shrinks the reservation window so the broker spills aggressively to
      # peers. Acceptable for jobs queue because run_job spends most of its time waiting on
      # NATS results rather than CPU. Other queues (ml_results, antenna) want the larger
      # pool — they're DB/Redis-bound and benefit from oversubscription.
      # CELERY_WORKER_CONCURRENCY: "4"
    restart: always

  celeryworker_ml:
    <<: *django
    scale: 4
    ports: []
    command: /start-celeryworker
    environment:
      CELERY_QUEUES: "ml_results"
    restart: always
