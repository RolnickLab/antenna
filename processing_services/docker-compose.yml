services:
  ml_backend_minimal:
    build:
      context: ./minimal
    volumes:
      - ./minimal/:/app:z
    ports:
      - "2000:2000"
    extra_hosts:
      - minio:host-gateway
    networks:
      - antenna_network
    # start.sh dispatches on MODE: api | worker | api+worker. For api+worker,
    # start.sh runs FastAPI first (for register.py to read /info), then
    # register.py, then the worker poll loop.
    env_file:
      - ./minimal/.env.dev

  ml_backend_example:
    build:
      context: ./example
    volumes:
      - ./example/:/app:z
    ports:
      - "2003:2000"
    extra_hosts:
      - minio:host-gateway
    networks:
      - antenna_network

networks:
  antenna_network:
    name: antenna_network
